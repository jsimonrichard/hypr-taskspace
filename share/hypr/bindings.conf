# LAE task-environment keybinds — installed to ~/.local/share/lae/hypr/
# Uses ~/.local/share/lae/bin/lae so keybinds work outside shell PATH (mise, etc.)

source = ~/.local/share/lae/hypr/unbind-omarchy.conf
source = ~/.local/share/lae/hypr/window-rules.conf

$lae = ~/.local/share/lae/bin/lae

# Context switching
bind = SUPER, H, exec, $lae taskspace default
bind = SUPER, ESCAPE, exec, $lae taskspace toggle-global

# Scoped desktop navigation (replaces Omarchy SUPER+[1-9,0] after unbind above)
bind = SUPER, code:10, exec, $lae workspace go 1
bind = SUPER, code:11, exec, $lae workspace go 2
bind = SUPER, code:12, exec, $lae workspace go 3
bind = SUPER, code:13, exec, $lae workspace go 4
bind = SUPER, code:14, exec, $lae workspace go 5
bind = SUPER, code:15, exec, $lae workspace go 6
bind = SUPER, code:16, exec, $lae workspace go 7
bind = SUPER, code:17, exec, $lae workspace go 8
bind = SUPER, code:18, exec, $lae workspace go 9
bind = SUPER, code:19, exec, $lae workspace go 10
bind = SUPER, 1, exec, $lae workspace go 1
bind = SUPER, 2, exec, $lae workspace go 2
bind = SUPER, 3, exec, $lae workspace go 3
bind = SUPER, 4, exec, $lae workspace go 4
bind = SUPER, 5, exec, $lae workspace go 5
bind = SUPER, 6, exec, $lae workspace go 6
bind = SUPER, 7, exec, $lae workspace go 7
bind = SUPER, 8, exec, $lae workspace go 8
bind = SUPER, 9, exec, $lae workspace go 9
bind = SUPER, 0, exec, $lae workspace go 10
bind = SUPER, bracketleft, exec, $lae desktop prev
bind = SUPER, bracketright, exec, $lae desktop next
bind = SUPER, mouse_down, exec, $lae desktop next
bind = SUPER, mouse_up, exec, $lae desktop prev

# Task menu (Tab) and task terminal
bind = SUPER, TAB, exec, $lae task menu
bind = SUPER, T, exec, $lae task terminal

bind = SUPER ALT, G, exec, $lae taskspace global
