# LAE task-environment keybinds — installed to ~/.local/share/lae/hypr/
# Workspace slots use hyprctl directly; lae syncs state.db afterward.

source = ~/.local/share/lae/hypr/unbind-omarchy.conf
source = ~/.local/share/lae/hypr/window-rules.conf

$lae = ~/.local/share/lae/bin/lae
$lae_ws = ~/.local/share/lae/bin/lae-workspace-switch
$lae_term = ~/.local/share/lae/bin/lae-terminal

# Context switching
bind = SUPER, H, exec, $lae taskspace default

# Scoped desktop navigation — hyprctl first, lae remember async
bind = SUPER, code:10, exec, $lae_ws 1
bind = SUPER, code:11, exec, $lae_ws 2
bind = SUPER, code:12, exec, $lae_ws 3
bind = SUPER, code:13, exec, $lae_ws 4
bind = SUPER, code:14, exec, $lae_ws 5
bind = SUPER, code:15, exec, $lae_ws 6
bind = SUPER, code:16, exec, $lae_ws 7
bind = SUPER, code:17, exec, $lae_ws 8
bind = SUPER, code:18, exec, $lae_ws 9
bind = SUPER, code:19, exec, $lae_ws 10
bind = SUPER, 1, exec, $lae_ws 1
bind = SUPER, 2, exec, $lae_ws 2
bind = SUPER, 3, exec, $lae_ws 3
bind = SUPER, 4, exec, $lae_ws 4
bind = SUPER, 5, exec, $lae_ws 5
bind = SUPER, 6, exec, $lae_ws 6
bind = SUPER, 7, exec, $lae_ws 7
bind = SUPER, 8, exec, $lae_ws 8
bind = SUPER, 9, exec, $lae_ws 9
bind = SUPER, 0, exec, $lae_ws 10
bind = SUPER, bracketleft, exec, $lae workspace prev
bind = SUPER, bracketright, exec, $lae workspace next
bind = SUPER, mouse_down, exec, $lae workspace next
bind = SUPER, mouse_up, exec, $lae workspace prev

# Task manager TUI — SUPER+Tab
bind = SUPER, TAB, exec, $lae task tui-launch

# Terminal — task repo when in a task taskspace, otherwise ~
bind = SUPER, RETURN, exec, $lae_term
