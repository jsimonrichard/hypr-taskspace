# Hypr Taskspace task-environment keybinds — installed to ~/.local/share/tsk/hypr/
# Workspace slots use hyprctl directly; tsk syncs state.db afterward.

source = ~/.local/share/tsk/hypr/unbind-omarchy.conf
source = ~/.local/share/tsk/hypr/window-rules.conf

$tsk = ~/.local/share/tsk/bin/tsk
$tsk_ws = ~/.local/share/tsk/bin/tsk-workspace-switch
$tsk_term = ~/.local/share/tsk/bin/tsk-terminal

# Context switching
bind = SUPER, H, exec, $tsk taskspace default

# Scoped desktop navigation — hyprctl first, tsk remember async
bind = SUPER, code:10, exec, $tsk_ws 1
bind = SUPER, code:11, exec, $tsk_ws 2
bind = SUPER, code:12, exec, $tsk_ws 3
bind = SUPER, code:13, exec, $tsk_ws 4
bind = SUPER, code:14, exec, $tsk_ws 5
bind = SUPER, code:15, exec, $tsk_ws 6
bind = SUPER, code:16, exec, $tsk_ws 7
bind = SUPER, code:17, exec, $tsk_ws 8
bind = SUPER, code:18, exec, $tsk_ws 9
bind = SUPER, code:19, exec, $tsk_ws 10
bind = SUPER, 1, exec, $tsk_ws 1
bind = SUPER, 2, exec, $tsk_ws 2
bind = SUPER, 3, exec, $tsk_ws 3
bind = SUPER, 4, exec, $tsk_ws 4
bind = SUPER, 5, exec, $tsk_ws 5
bind = SUPER, 6, exec, $tsk_ws 6
bind = SUPER, 7, exec, $tsk_ws 7
bind = SUPER, 8, exec, $tsk_ws 8
bind = SUPER, 9, exec, $tsk_ws 9
bind = SUPER, 0, exec, $tsk_ws 10
bind = SUPER, bracketleft, exec, $tsk workspace prev
bind = SUPER, bracketright, exec, $tsk workspace next
bind = SUPER, mouse_down, exec, $tsk workspace next
bind = SUPER, mouse_up, exec, $tsk workspace prev

# Task manager TUI — SUPER+Tab
bind = SUPER, TAB, exec, $tsk task tui-launch

# Terminal — task repo when in a task taskspace, otherwise ~
bind = SUPER, RETURN, exec, $tsk_term
