# Hypr Taskspace keybinds — deployed to @TSK_SHARE@/hypr/bindings.conf
# Source this file last in hyprland.conf. Optional integrations live under hypr/integrations/.

source = @TSK_SHARE@/hypr/window-rules.conf

$tsk = @TSK_CMD@

# Context switching
bind = SUPER, H, exec, $tsk taskspace default

# Scoped desktop navigation — hyprctl first, tsk remember async
bind = SUPER, code:10, exec, $tsk workspace switch 1
bind = SUPER, code:11, exec, $tsk workspace switch 2
bind = SUPER, code:12, exec, $tsk workspace switch 3
bind = SUPER, code:13, exec, $tsk workspace switch 4
bind = SUPER, code:14, exec, $tsk workspace switch 5
bind = SUPER, code:15, exec, $tsk workspace switch 6
bind = SUPER, code:16, exec, $tsk workspace switch 7
bind = SUPER, code:17, exec, $tsk workspace switch 8
bind = SUPER, code:18, exec, $tsk workspace switch 9
bind = SUPER, code:19, exec, $tsk workspace switch 10
bind = SUPER, 1, exec, $tsk workspace switch 1
bind = SUPER, 2, exec, $tsk workspace switch 2
bind = SUPER, 3, exec, $tsk workspace switch 3
bind = SUPER, 4, exec, $tsk workspace switch 4
bind = SUPER, 5, exec, $tsk workspace switch 5
bind = SUPER, 6, exec, $tsk workspace switch 6
bind = SUPER, 7, exec, $tsk workspace switch 7
bind = SUPER, 8, exec, $tsk workspace switch 8
bind = SUPER, 9, exec, $tsk workspace switch 9
bind = SUPER, 0, exec, $tsk workspace switch 10
bind = SUPER SHIFT, code:10, exec, $tsk workspace move-dispatch 1
bind = SUPER SHIFT, code:11, exec, $tsk workspace move-dispatch 2
bind = SUPER SHIFT, code:12, exec, $tsk workspace move-dispatch 3
bind = SUPER SHIFT, code:13, exec, $tsk workspace move-dispatch 4
bind = SUPER SHIFT, code:14, exec, $tsk workspace move-dispatch 5
bind = SUPER SHIFT, code:15, exec, $tsk workspace move-dispatch 6
bind = SUPER SHIFT, code:16, exec, $tsk workspace move-dispatch 7
bind = SUPER SHIFT, code:17, exec, $tsk workspace move-dispatch 8
bind = SUPER SHIFT, code:18, exec, $tsk workspace move-dispatch 9
bind = SUPER SHIFT, code:19, exec, $tsk workspace move-dispatch 10
bind = SUPER SHIFT, 1, exec, $tsk workspace move-dispatch 1
bind = SUPER SHIFT, 2, exec, $tsk workspace move-dispatch 2
bind = SUPER SHIFT, 3, exec, $tsk workspace move-dispatch 3
bind = SUPER SHIFT, 4, exec, $tsk workspace move-dispatch 4
bind = SUPER SHIFT, 5, exec, $tsk workspace move-dispatch 5
bind = SUPER SHIFT, 6, exec, $tsk workspace move-dispatch 6
bind = SUPER SHIFT, 7, exec, $tsk workspace move-dispatch 7
bind = SUPER SHIFT, 8, exec, $tsk workspace move-dispatch 8
bind = SUPER SHIFT, 9, exec, $tsk workspace move-dispatch 9
bind = SUPER SHIFT, 0, exec, $tsk workspace move-dispatch 10
bind = SUPER, bracketleft, exec, $tsk workspace prev
bind = SUPER, bracketright, exec, $tsk workspace next
bind = SUPER, mouse_up, exec, $tsk workspace next
bind = SUPER, mouse_down, exec, $tsk workspace prev

# Touchpad workspace swipes — natural direction (swipe left → next, swipe right → prev)
gesture = 3, left, dispatcher, exec, $tsk workspace next --no-wrap
gesture = 3, right, dispatcher, exec, $tsk workspace prev --no-wrap

# Task manager TUI — SUPER+Tab
bind = SUPER, TAB, exec, $tsk task tui-launch

# Terminal — task repo when in a task taskspace, otherwise ~
# (Distrobox enter when the task was created with container isolation)
bind = SUPER, RETURN, exec, $tsk task terminal

# Editor / browser — Cursor/VS Code and Chromium (Distrobox enter when isolation is on)
bind = SUPER, E, exec, $tsk task editor
bind = SUPER, B, exec, $tsk task browser
