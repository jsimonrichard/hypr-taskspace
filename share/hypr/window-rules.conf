# Hypr Taskspace window rules — sourced from bindings.conf

# Task manager TUI (tsk task tui-launch / SUPER+SHIFT+Tab)
windowrule = float on, match:title ^tsk tasks$
windowrule = center on, match:title ^tsk tasks$
windowrule = size 880 520, match:title ^tsk tasks$
windowrule = float on, match:class org.tsk.task-tui
windowrule = center on, match:class org.tsk.task-tui
windowrule = size 880 520, match:class org.tsk.task-tui
