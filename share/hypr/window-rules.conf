# LAE window rules — sourced from bindings.conf

# Task manager TUI (lae task tui-launch / SUPER+SHIFT+Tab)
windowrule = float on, match:title ^lae tasks$
windowrule = center on, match:title ^lae tasks$
windowrule = size 880 520, match:title ^lae tasks$
windowrule = float on, match:class org.lae.task-tui
windowrule = center on, match:class org.lae.task-tui
windowrule = size 880 520, match:class org.lae.task-tui
